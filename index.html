<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Table</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #111111, #080808);
      color: #f4f4f4;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 28px;
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .panel {
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;

      padding: 28px;
      box-shadow: 0 16px 44px rgba(0,0,0,0.42);
    }
    h1 { margin: 0 0 10px 0; font-size: 40px; text-transform: uppercase; letter-spacing: 1px; }
    p { color: rgba(255,255,255,0.76); font-size: 17px; line-height: 1.5; }
    a { color: #ffffff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.24); padding-bottom: 2px; font-weight: bold; }
    a:hover { border-bottom-color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Card Table</h1>
      <p>A public deck-tracking table for Wolf's shuffle collection.</p>
      <p>This version supports 2 through 10, aces, jacks, queens, kings, and both jokers.</p>
      <p>Latest generated table for <strong>smolnova92</strong>:</p>
      <p><a href="collections/smolnova92.html">Open smolnova92's card table</a></p>

  </div>
